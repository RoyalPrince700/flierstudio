<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>QA · Orbit Flagship Tray</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../src/fliers/orbit-gadgets/flagship-tray.css" />
    <style>
      body {
        margin: 0;
        background: #222;
      }
      .ph-logo {
        width: 64px;
        height: 64px;
        border-radius: 14px;
        background: #0b5fff;
        color: #fff;
        display: grid;
        place-items: center;
        font: 800 18px Manrope, sans-serif;
      }
    </style>
  </head>
  <body>
    <article class="og-tray">
      <div class="og-tray__glow" aria-hidden="true"></div>
      <div class="og-tray__safe">
        <header class="og-tray__header">
          <div class="og-tray__brand">
            <div class="ph-logo">OG</div>
            <div class="og-tray__brand-text">
              <span>Orbit</span>
              <span>Gadgets</span>
            </div>
          </div>
          <p class="og-tray__address">
            <span>📍</span>
            <span>Unit 12 · Market Plaza · Demo City</span>
          </p>
        </header>
        <div class="og-tray__headline">
          <h1>Which one fits you?</h1>
          <p>Every flagship has a different vibe.</p>
        </div>
        <div class="og-tray__stage">
          <div class="og-tray__shelf">
            <div class="og-tray__logos">
              <span class="og-tray__logo-chip" style="--chip-accent: #ff7a3d">Aura</span>
              <span class="og-tray__logo-chip" style="--chip-accent: #9aa3ad">Nova</span>
              <span class="og-tray__logo-chip" style="--chip-accent: #c5d4e8">Pulse</span>
            </div>
            <div class="og-tray__slot">
              <img class="og-tray__phone" src="../public/assets/orbit-gadgets/phone-coral-cutout.png" alt="Aura" />
            </div>
            <div class="og-tray__slot">
              <img class="og-tray__phone" src="../public/assets/orbit-gadgets/phone-titanium-cutout.png" alt="Nova" />
            </div>
            <div class="og-tray__slot">
              <img class="og-tray__phone" src="../public/assets/orbit-gadgets/phone-porcelain-cutout.png" alt="Pulse" />
            </div>
          </div>
        </div>
        <footer class="og-tray__footer-dock">
          <div class="og-tray__footer-inner">
            <span class="og-tray__cta">Shop now</span>
            <div class="og-tray__contacts">
              <span class="og-tray__contact">💬 📞 +234 000 000 0000</span>
              <span class="og-tray__contact">📷 @orbit_gadgets</span>
            </div>
          </div>
        </footer>
      </div>
    </article>
  </body>
</html>
